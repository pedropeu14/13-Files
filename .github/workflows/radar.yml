name: Atualizar radar (13D/G, notícias, cartas)

on:
  schedule:
    # 2x/dia úteis: manhã e após o fechamento (UTC) — 13D pode sair a qualquer hora
    - cron: "0 11 * * 1-5"
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Gerar radar.json (EDGAR + Google News + letters.json)
        env:
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || 'Pedro Amorim pedrof.amorim@gmail.com' }}
        run: python radar.py

      - name: Commitar se mudou (o push republica o Pages)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add radar.json
          git diff --cached --quiet || git commit -m "radar: refresh $(date -u +%F)"
          git push
